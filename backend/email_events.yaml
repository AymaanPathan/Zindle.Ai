dsl_version: 3
version: "1"
name: email_events_local
backend: postgres

connection:
  host: ${SUPABASE_HOST}
  port: ${SUPABASE_PORT}
  database: ${SUPABASE_DB}
  user: ${SUPABASE_USER}
  password: ${SUPABASE_PASSWORD}
  ssl: true

tables:
  - name: email_events
    description: Email engagement events from Resend webhooks